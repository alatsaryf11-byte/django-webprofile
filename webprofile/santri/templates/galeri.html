{% extends 'base.html' %}

{% block title %}Galeri Karya Santri{% endblock %}

            <img src="https://backend.adventuraja.com/gallery/6233362a317f5926664e6060/hiking%20gunung%20lawu%201.jpg" alt="JIS">

    </section>
      
    <section class="card gallery-card">

      <iframe width="560" height="315" src="https://www.youtube.com/embed/FE3wsDrf_tM?si=NFu_Ggys-CDrfJsZ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
